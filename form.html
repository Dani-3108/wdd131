<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W05 Assignment: Product Review Form | WDD131</title>
    <meta name="description" content="project of W05 Assignment: Product Review Form">
    <meta name="author" content="Daniel Osorio">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html">
            <label>Product Name*
                <select name="productName" id="productName" required>
                    <option value="" disabled selected> Select a Product ... </option>
                </select>
            </label>
            <fieldset class="radio">
                <legend>Overall Rating*</legend>
                <label>☆<input type="radio" name="rating" value="1" required></label>
                <label>☆☆<input type="radio" name="rating" value="2"></label>
                <label>☆☆☆<input type="radio" name="rating" value="3"></label>
                <label>☆☆☆☆<input type="radio" name="rating" value="4"></label>
                <label>☆☆☆☆☆<input type="radio" name="rating" value="5"></label>
            </fieldset>
            <label>Date of Installation*
                <input type="date" name="installationDate" id="installationDate" required>
            </label>
            <fieldset>
                <legend>Which features did you find useful? Check all that apply</legend>
                <label><input type="checkbox" name="durability" id="durability" value="durability">Durability</label>
                <label><input type="checkbox" name="easeofuse" id="easeofuse" value="easeofuse">Ease of Use</label>
                <label><input type="checkbox" name="performance" id="performance" value="performance">Performance</label>
                <label><input type="checkbox" name="design" id="design" value="design">Design</label>
            </fieldset>
            <label>Written Review (Optional)<textarea name="writtenreview" id="writtenreview"></textarea></label>
            <label>Your Name (Optional)<input type="text" name="yourname" id="yourname"></label>
            <input class="submitButton" type="submit" value="Post Review">
        </form>
    </main>
    <footer>
        <p>©️<span id="currentyear"></span>🌿 Daniel Osorio 🌿 Mexico</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
