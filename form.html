<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W05 Assignment: Product Review Form | WDD131</title>
    <meta name="description" content="project of W05 Assignment: Product Review Form is a practice of creating forms on web development">
    <meta name="author" content="Daniel Osorio">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html">
            <label for="productName">Product Name*
                <select name="productName" id="productName" required>
                    <option value="" disabled selected> Select a Product ... </option>
                </select>
            </label>
            <fieldset class="radio">
                <legend>Overall Rating*</legend>
                <label for="star1">☆<input type="radio" name="rating" id="star1" value="1" required></label>
                <label for="star2">☆☆<input type="radio" name="rating" id="star2" value="2" required></label>
                <label for="star3">☆☆☆<input type="radio" name="rating" id="star3" value="3" required></label>
                <label for="star4">☆☆☆☆<input type="radio" name="rating" id="star4" value="4" required></label>
                <label for="star5">☆☆☆☆☆<input type="radio" name="rating" id="star5" value="5" required></label>
            </fieldset>
            <label for="installationDate">Date of Installation*
                <input type="date" name="installationDate" id="installationDate" required>
            </label>
            <fieldset>
                <legend>Which features did you find useful? Check all that apply</legend>
                <label for="durability"><input type="checkbox" name="durability" id="durability" value="durability">Durability</label>
                <label for="easeofuse"><input type="checkbox" name="easeofuse" id="easeofuse" value="easeofuse">Ease of Use</label>
                <label for="performance"><input type="checkbox" name="performance" id="performance" value="performance">Performance</label>
                <label for="design"><input type="checkbox" name="design" id="design" value="design">Design</label>
            </fieldset>
            <label for="writtenreview">Written Review (Optional)<textarea name="writtenreview" id="writtenreview"></textarea></label>
            <label for="yourname">Your Name (Optional)<input type="text" name="yourname" id="yourname"></label>
            <input class="submitButton" type="submit" value="Post Review">
        </form>
    </main>
    <footer>
        <p>©️<span id="currentyear"></span>🌿 Daniel Osorio 🌿 Mexico</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
