<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 06 WDD131 Project Web Page UnitX</title>
    <meta name="description"
        content="My site is about AI vision systems. It covers what they are, what they are used in manufacturing environments and how they are built. This offers a brief but solid introduction for engineers that want to implement this on their plants.">
    <meta name="author" content="Daniel Osorio">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/index.css">
    <script src="scripts/index.js" defer></script>
</head>
<body>
    <header>
        <h1>UnitX</h1>
        <button id="hamburger" aria-label="Menu">&#9776;</button>
        <nav class="menu">
            <a href="index.html">Home</a>
            <a href="how-it-works.html">Products</a>
            <a href="contact.html">About Us</a>
        </nav>
    </header>
    <main>
        <h2>Talk to an Expert Today</h2>
        <form action="">
            <fieldset>
                <legend>Your information</legend>
                <label for="yourname">Your Name*<input type="text" name="yourname" id="yourname" required></label>
                <label for="youremail">Company Email Address*<input type="email" name="youremail" id="youremail" required></label>
                <label for="yourphone">Phone Number (Optional)<input type="text" name="yourphone" id="yourphone"></label>
                <label for="yourcompany">Your Company*<input type="text" name="yourcompany" id="yourcompany" required></label>
                <label for="yourtitle">Your Position*<input type="text" name="yourtitle" id="yourtitle" required></label>
            </fieldset>
            <fieldset>
                <legend>Product</legend>
                <label for="productName">Products*
                    <select name="productName" id="productName" required>
                        <option value="" disabled selected> Select a Product ...</option>
                        <option value="Cameras">Cameras</option>
                        <option value="brain">Brain / CPU</option>
                        <option value="AI">AI interface</option>
                    </select>
                </label>
                <label for="hearfromus">How did you hear about us?* <input type="text" name="hearfromus" id="hearfromus"></label>
                <label for="comments">Comments / additional information <textarea name="comments" id="comments"></textarea></label>
            </fieldset>
            <input class="submitButton" type="submit" value="Requesting to get contacted">
        </form>
    </main>
    <footer>
        <p>&copy;<span id="currentyear"></span> 🌿 Daniel Osorio 🌿 Mexico</p>
        <p id="lastModified"></p>
        <a href="references.html">References</a>
    </footer>
</body>
</html>
